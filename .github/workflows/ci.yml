name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Restore Nx Cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          # Der Key sollte sich ändern, wenn sich Abhängigkeiten oder die Lock-Datei ändern
          key: nx-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          # Restore-Keys erlauben es, den Cache eines vorherigen Commits zu nutzen
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nx-${{ runner.os }}-

      # setup maven cache
      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-deps-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-deps-${{ runner.os }}-

      - name: Setup Tools (mise)
        uses: jdx/mise-action@v4.0.1

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Set Nx SHAs
        uses: nrwl/nx-set-shas@v5

      - name: Lint and Format Check (Example)
        run: npx nx affected -t build # Running build first as it's our primary target

      - name: Build Affected
        run: npx nx affected -t build

      - name: Docker Build Affected
        run: |
          # Note: This only builds images locally to verify the Dockerfile
          # To push to a registry, you would need 'docker login' and 'docker push'
          npx nx affected -t docker-build

      - name: Helm Package Affected
        run: npx nx affected -t helm-package

      - name: Upload Helm Charts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: helm-charts
          path: dist/charts/*.tgz
          if-no-files-found: ignore
