name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Tools (mise)
        uses: jdx/mise-action@v4.0.1

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Set Nx SHAs
        uses: nrwl/nx-set-shas@v5.0.1

      - name: Unit Tests
        run: npx nx affected -t test

      - name: Build Affected
        run: npx nx affected -t build

      - name: Docker Build Affected
        run: |
          # Note: This only builds images locally to verify the Dockerfile
          # To push to a registry, you would need 'docker login' and 'docker push'
          npx nx affected -t docker-build

      - name: Helm Package Affected
        run: npx nx affected -t helm-package

      - name: Upload Helm Charts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: helm-charts
          path: dist/charts/*.tgz
          if-no-files-found: ignore
